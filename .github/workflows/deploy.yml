# Название workflow — отображается во вкладке Actions на GitHub
name: Build and Deploy

# Когда запускать pipeline
on:
  # Автоматически при каждом push в ветку main
  push:
    branches: [main]
  # Ручной запуск из интерфейса GitHub: Actions → Build and Deploy → Run workflow
  workflow_dispatch:

# Общие переменные для всех джоб
env:
  REGISTRY: ghcr.io                                          # адрес GitHub Container Registry
  IMAGE_NAME: ghcr.io/${{ github.repository }}               # полное имя образа, напр. ghcr.io/for9653960484/vmeste

# Права токена GITHUB_TOKEN для этого workflow
permissions:
  contents: read    # чтение исходников репозитория
  packages: write   # публикация Docker-образа в GHCR

jobs:
  # ── Джоба 1: сборка образа и отправка в реестр ──────────────────────────
  build-and-push:
    name: Build Docker image and push to GHCR
    runs-on: ubuntu-latest

    steps:
      # Клонирование репозитория на runner
      - name: Checkout
        uses: actions/checkout@v4

      # Установка Docker Buildx (ускоренная сборка, кэш слоёв)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Авторизация в GHCR — токен GITHUB_TOKEN выдаётся автоматически
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка Dockerfile из корня репозитория и push двух тегов: latest и хеш коммита
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha   # использовать кэш предыдущих сборок
          cache-to: type=gha,mode=max

  # ── Джоба 2: деплой на удалённый сервер по SSH ───────────────────────────
  deploy:
    name: Deploy to remote server via SSH
    runs-on: ubuntu-latest
    needs: build-and-push   # стартует только после успешной сборки и push образа

    steps:
      # Подключение к серверу и выполнение shell-скрипта развёртывания
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}              # IP или домен сервера
          username: ${{ secrets.SSH_USER }}          # пользователь SSH
          key: ${{ secrets.SSH_PRIVATE_KEY }}      # приватный ключ (содержимое id_rsa / id_ed25519)
          port: ${{ secrets.SSH_PORT || 22 }}      # порт SSH (по умолчанию 22)
          script_stop: true                          # остановить деплой при первой ошибке в script
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE_NAME }}:latest"
            CONTAINER_NAME="vmeste-api"
            APP_DIR="/opt/vmeste"                    # каталог на сервере с файлом .env

            mkdir -p "$APP_DIR"

            # Вход в GHCR на сервере (нужен для private-пакетов; секреты GHCR_USERNAME и GHCR_TOKEN)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # Скачать свежий образ из реестра
            docker pull "$IMAGE"

            # Остановить и удалить старый контейнер, если он уже запущен
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            # Запустить новый контейнер; переменные окружения берутся из /opt/vmeste/.env на сервере
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 8001:8001 \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            # Удалить неиспользуемые старые образы, чтобы не забивать диск
            docker image prune -f
