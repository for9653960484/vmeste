# Название workflow — отображается во вкладке Actions на GitHub
name: Build and Deploy

# Когда запускать pipeline
on:
  # Автоматически при каждом push в ветку main
  push:
    branches: [main]
  # Ручной запуск из интерфейса GitHub: Actions → Build and Deploy → Run workflow
  workflow_dispatch:

# Общие переменные для всех джоб
env:
  REGISTRY: ghcr.io                                          # адрес GitHub Container Registry
  IMAGE_API: ghcr.io/${{ github.repository }}                # образ backend API
  IMAGE_LANDING: ghcr.io/${{ github.repository }}-landing    # образ лендинга

# Права токена GITHUB_TOKEN для этого workflow
permissions:
  contents: read    # чтение исходников репозитория
  packages: write   # публикация Docker-образа в GHCR

jobs:
  # ── Джоба 1: сборка двух образов и отправка в реестр ─────────────────────
  build-and-push:
    name: Build Docker images and push to GHCR
    runs-on: ubuntu-latest

    steps:
      # Клонирование репозитория на runner
      - name: Checkout
        uses: actions/checkout@v4

      # Установка Docker Buildx (ускоренная сборка, кэш слоёв)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Авторизация в GHCR — токен GITHUB_TOKEN выдаётся автоматически
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка и push образа backend (main.py)
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Сборка и push образа лендинга (Landing/landing_driver.py)
      - name: Build and push Landing image
        uses: docker/build-push-action@v6
        with:
          context: ./Landing
          file: ./Landing/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_LANDING }}:latest
            ${{ env.IMAGE_LANDING }}:${{ github.sha }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  # ── Джоба 2: деплой двух контейнеров на удалённый сервер по SSH ──────────
  deploy:
    name: Deploy to remote server via SSH
    runs-on: ubuntu-latest
    needs: build-and-push   # стартует только после успешной сборки и push образов

    steps:
      # Подключение к серверу и выполнение shell-скрипта развёртывания
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}              # IP или домен сервера
          username: ${{ secrets.SSH_USER }}          # пользователь SSH
          key: ${{ secrets.SSH_PRIVATE_KEY }}        # приватный ключ (содержимое id_rsa / id_ed25519)
          port: ${{ secrets.SSH_PORT || 22 }}        # порт SSH (по умолчанию 22)
          script_stop: true                          # остановить деплой при первой ошибке в script
          script: |
            set -euo pipefail

            API_IMAGE="${{ env.IMAGE_API }}:latest"
            LANDING_IMAGE="${{ env.IMAGE_LANDING }}:latest"
            API_CONTAINER="vmeste-api"
            LANDING_CONTAINER="vmeste-landing"
            NETWORK_NAME="vmeste-net"
            APP_DIR="/opt/vmeste"                    # каталог на сервере с файлом .env

            mkdir -p "$APP_DIR"

            # Общая сеть: лендинг обращается к API по имени контейнера vmeste-api
            docker network create "$NETWORK_NAME" 2>/dev/null || true

            # Вход в GHCR на сервере (нужен для private-пакетов; секреты GHCR_USERNAME и GHCR_TOKEN)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # Скачать свежие образы из реестра
            docker pull "$API_IMAGE"
            docker pull "$LANDING_IMAGE"

            # ── Backend API ──────────────────────────────────────────────────
            docker stop "$API_CONTAINER" 2>/dev/null || true
            docker rm "$API_CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$API_CONTAINER" \
              --network "$NETWORK_NAME" \
              --restart unless-stopped \
              -p 8001:8000 \
              --env-file "$APP_DIR/.env" \
              --add-host=host.docker.internal:host-gateway \
              "$API_IMAGE"

            # ── Лендинг ────────────────────────────────────────────────────
            docker stop "$LANDING_CONTAINER" 2>/dev/null || true
            docker rm "$LANDING_CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$LANDING_CONTAINER" \
              --network "$NETWORK_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file "$APP_DIR/.env" \
              -e CRM_API_URL=http://vmeste-api:8000/lead \
              --add-host=host.docker.internal:host-gateway \
              "$LANDING_IMAGE"

            # Удалить неиспользуемые старые образы, чтобы не забивать диск
            docker image prune -f
